services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
