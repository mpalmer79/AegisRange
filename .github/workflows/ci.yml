name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt -r dev-requirements.txt
          pip install ruff mypy

      - name: Verify Ruff is available
        run: python -m ruff --version

      - name: Ruff check
        run: python -m ruff check app/ tests/

      - name: Ruff format check
        run: python -m ruff format --check app/ tests/

      - name: Mypy type check
        run: python -m mypy app/ --ignore-missing-imports

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt -r dev-requirements.txt
          pip install pytest pytest-cov httpx

      - name: Verify pytest is available
        run: python -m pytest --version

      - name: Verify httpx is available
        run: python -c "import httpx; print(httpx.__version__)"

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Verify no datetime.utcnow usage
        run: |
          python -c "
          import ast, pathlib, sys
          def scan(src):
              try: tree = ast.parse(src)
              except SyntaxError: return []
              return [n.lineno for n in ast.walk(tree)
                      if isinstance(n, ast.Attribute) and n.attr == 'utcnow'
                      and isinstance(n.value, ast.Name) and n.value.id == 'datetime']
          hits = []
          for f in pathlib.Path('.').rglob('*.py'):
              h = scan(f.read_text())
              if h: hits.append((str(f), h))
          if hits:
              for f, lines in hits: print(f'ERROR: {f} lines {lines}')
              sys.exit(1)
          print('OK: zero datetime.utcnow usage')
          "

  backend-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit security scan
        run: bandit -r app/ --severity-level medium -f txt

      - name: pip-audit dependency vulnerability scan (blocking)
        run: pip-audit -r requirements.txt --strict

  secret-scanning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar xz
          chmod +x gitleaks

      - name: Run gitleaks secret scan
        run: ./gitleaks detect --source . --verbose

  sbom-generation:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install CycloneDX
        run: pip install cyclonedx-bom

      - name: Generate backend SBOM
        run: cyclonedx-py requirements backend/requirements.txt -o backend-sbom.json --format json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: backend-sbom.json
          retention-days: 90

  frontend-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Audit npm dependencies (advisory)
        run: npm audit --audit-level=critical || echo "::warning::npm audit found vulnerabilities — review before production deployment"

  frontend-test:
    runs-on: ubuntu-latest
    needs: frontend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify standalone output
        run: test -f .next/standalone/server.js

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, backend-security, secret-scanning, frontend-build]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build backend image
        run: docker build -t aegisrange-backend ./backend

      - name: Build frontend image
        run: docker build -t aegisrange-frontend ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan backend image for vulnerabilities
        run: trivy image --severity CRITICAL,HIGH --exit-code 1 aegisrange-backend

      - name: Scan frontend image for vulnerabilities
        run: trivy image --severity CRITICAL,HIGH --exit-code 1 aegisrange-frontend
